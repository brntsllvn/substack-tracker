<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Substack Finance Leaderboard</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #141414; color: #e5e0d8; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  .topbar { display: flex; align-items: center; gap: 14px; padding: 10px 22px; background: #1c1c1c; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; }
  .topbar h1 { font-size: 0.92rem; font-weight: 600; color: #e5e0d8; white-space: nowrap; letter-spacing: -0.01em; }
  .sep { color: #444; font-size: 0.8rem; }
  .category-toggle { display: flex; border: 1px solid #333; border-radius: 5px; overflow: hidden; flex-shrink: 0; }
  .category-toggle button { padding: 4px 14px; border: none; background: transparent; cursor: pointer; font-size: 0.8rem; color: #888; transition: background 0.12s, color 0.12s; }
  .category-toggle button.active { background: #ff6719; color: #fff; }
  .topbar-right { margin-left: auto; font-size: 0.75rem; color: #555; }

  #chart-area { flex: 1; min-height: 0; position: relative; }
  svg { width: 100%; height: 100%; }
  .grid line { stroke: rgba(255,255,255,0.04); }
  .grid path { display: none; }
  .axis path { display: none; }
  .axis line { stroke: rgba(255,255,255,0.08); }
  .axis text { font-size: 10px; fill: #555; }

  .track { fill: none; stroke: rgba(255,103,25,0.13); stroke-width: 1.5; transition: stroke 0.08s; }
  .track.hovered { stroke: #ff6719; stroke-width: 2.5; }

  .tooltip-box { position: fixed; pointer-events: none; z-index: 200; display: flex; align-items: center; gap: 8px; background: #1c1c1c; border: 1px solid #333; border-radius: 6px; padding: 6px 10px; font-size: 0.75rem; color: #e5e0d8; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
  .tooltip-box img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
  .tooltip-rank { color: #ff6719; font-weight: 600; font-size: 0.85rem; }
  .tooltip-name { color: #e5e0d8; }
  .tooltip-date { color: #666; font-size: 0.7rem; }

  .state-msg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #555; font-size: 0.88rem; }

  /* Hover label at end of highlighted line */
  .end-label text { font-size: 11px; fill: #e5e0d8; }
  .end-label image { border-radius: 50%; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Substack Finance Leaderboard</h1>
  <span class="sep">·</span>
  <div class="category-toggle">
    <button id="btn-rising" class="active" onclick="setCategory('rising')">Rising</button>
    <button id="btn-paid" onclick="setCategory('paid')">Paid</button>
  </div>
  <div class="topbar-right" id="subtitle">Top 100 · updated daily</div>
</div>

<div id="chart-area"><div class="state-msg">Loading...</div></div>
<div class="tooltip-box" id="tooltip" style="display:none">
  <img id="tip-img" src="" onerror="this.style.display='none'">
  <div>
    <div><span class="tooltip-rank" id="tip-rank"></span> <span class="tooltip-name" id="tip-name"></span></div>
    <div class="tooltip-date" id="tip-date"></div>
  </div>
</div>

<script>
let allData = [];
let category = "rising";
let hoveredKey = null;

async function loadData() {
  let idx;
  try { idx = await fetch("data/index.json").then(r => r.json()); }
  catch { showMsg("No data yet. Scraper runs at 06:00 UTC."); return; }
  if (!idx.dates?.length) { showMsg("No data yet. Scraper runs at 06:00 UTC."); return; }

  const days = await Promise.all(
    idx.dates.map(d => fetch(`data/${d}.json`).then(r => r.json()).catch(() => null))
  );
  allData = days.filter(Boolean);
  document.getElementById("subtitle").textContent =
    `Top 100 · ${allData.length} day${allData.length !== 1 ? "s" : ""} · updated daily`;
  render();
}

function showMsg(m) {
  document.getElementById("chart-area").innerHTML = `<div class="state-msg">${m}</div>`;
}

function key(e) { return e.subdomain || e.url || e.name; }

function buildSeries() {
  // Collect all unique newsletters in current category across all days
  const keys = new Map(); // k -> {name, logo}
  for (const day of allData) {
    for (const e of day[category] || []) {
      const k = key(e);
      if (!keys.has(k)) keys.set(k, { name: e.name, logo: e.logo_url });
    }
  }

  return Array.from(keys.entries()).map(([k, meta]) => {
    const points = allData.map(day => {
      const e = (day[category] || []).find(e2 => key(e2) === k);
      return e ? { date: new Date(day.date), rank: e.rank } : null;
    }).filter(Boolean);
    return { k, name: meta.name, logo: meta.logo, points };
  }).filter(s => s.points.length > 0);
}

function setCategory(c) {
  category = c;
  document.getElementById("btn-rising").className = c === "rising" ? "active" : "";
  document.getElementById("btn-paid").className = c === "paid" ? "active" : "";
  render();
}

function render() {
  const area = document.getElementById("chart-area");
  if (!allData.length) return;

  const series = buildSeries();
  if (!series.length) { showMsg("No data."); return; }

  const margin = { top: 14, right: 16, bottom: 28, left: 40 };
  const W = area.clientWidth - margin.left - margin.right;
  const H = area.clientHeight - margin.top - margin.bottom;

  const allDates = allData.map(d => new Date(d.date));
  const xPad = allDates.length > 1 ? (allDates[allDates.length-1] - allDates[0]) * 0.02 : 3600e3 * 12;
  const xScale = d3.scaleTime()
    .domain([new Date(allDates[0] - xPad), new Date(+allDates[allDates.length-1] + xPad)])
    .range([0, W]);
  const yScale = d3.scaleLinear().domain([1, 100]).range([0, H]);

  area.innerHTML = "";
  const svg = d3.select(area).append("svg");
  const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

  // Grid
  g.append("g").attr("class", "grid")
    .call(d3.axisLeft(yScale).ticks(10).tickSize(-W).tickFormat(""));

  // Axes
  g.append("g").attr("class", "axis")
    .attr("transform", `translate(0,${H})`)
    .call(d3.axisBottom(xScale)
      .ticks(Math.min(allDates.length, 10))
      .tickFormat(d3.timeFormat("%-m/%-d")));

  g.append("g").attr("class", "axis")
    .call(d3.axisLeft(yScale).ticks(10).tickFormat(d => `#${d}`));

  const stepLine = d3.line()
    .x(d => xScale(d.date))
    .y(d => yScale(d.rank))
    .curve(d3.curveStepAfter);

  // Draw all tracks
  const paths = g.selectAll(".track")
    .data(series, d => d.k)
    .join("path")
    .attr("class", "track")
    .attr("d", d => stepLine(d.points))
    .attr("data-key", d => d.k);

  // Hover end label group (shown on hover)
  const endLabel = svg.append("g").attr("class", "end-label").style("display", "none");
  const defs = svg.append("defs");
  const clipId = "end-avatar";
  defs.append("clipPath").attr("id", clipId)
    .append("circle").attr("r", 11);
  endLabel.append("image").attr("id", "end-img").attr("width", 22).attr("height", 22).attr("clip-path", `url(#${clipId})`).attr("preserveAspectRatio", "xMidYMid slice");
  endLabel.append("circle").attr("id", "end-circle").attr("r", 11).attr("fill", "none").attr("stroke", "#ff6719").attr("stroke-width", 1.5);
  endLabel.append("text").attr("id", "end-text").attr("dy", "0.35em").attr("dx", 16);

  const tooltip = document.getElementById("tooltip");
  const tipImg = document.getElementById("tip-img");
  const tipRank = document.getElementById("tip-rank");
  const tipName = document.getElementById("tip-name");
  const tipDate = document.getElementById("tip-date");

  // Bisect for x position
  const bisect = d3.bisector(d => d).left;

  function findNearest(mouseX, mouseY) {
    const dateAtX = xScale.invert(mouseX);
    const sortedDates = allData.map(d => new Date(d.date));
    const idx = Math.max(0, bisect(sortedDates, dateAtX) - 1);
    const day = allData[idx];
    if (!day) return null;

    const rankAtY = yScale.invert(mouseY);
    let best = null, bestDist = Infinity;
    for (const s of series) {
      const pt = s.points.find(p => +p.date === +new Date(day.date));
      if (!pt) continue;
      const dist = Math.abs(pt.rank - rankAtY);
      if (dist < bestDist) { bestDist = dist; best = { s, pt, day }; }
    }
    return bestDist < 8 ? best : null;
  }

  svg.on("mousemove", function(event) {
    const [mx, my] = d3.pointer(event, g.node());
    if (mx < 0 || mx > W || my < 0 || my > H) {
      clearHover(); return;
    }
    const hit = findNearest(mx, my);
    if (!hit) { clearHover(); return; }

    const { s, pt, day } = hit;
    if (hoveredKey !== s.k) {
      hoveredKey = s.k;
      paths.classed("hovered", d => d.k === s.k);

      // End label: place at last point of hovered series
      const last = s.points[s.points.length - 1];
      const ex = xScale(last.date) + margin.left;
      const ey = yScale(last.rank) + margin.top;
      endLabel.style("display", null);
      endLabel.select("#end-img").attr("href", s.logo || "").attr("x", ex - 11).attr("y", ey - 11);
      endLabel.select("#end-circle").attr("cx", ex).attr("cy", ey);
      const nameEl = endLabel.select("#end-text").attr("x", ex).attr("y", ey).text(s.name.length > 20 ? s.name.slice(0, 18) + "…" : s.name);
      endLabel.select(`#${clipId} circle`).attr("cx", ex).attr("cy", ey);
    }

    // Tooltip
    tooltip.style.display = "flex";
    tooltip.style.left = (event.clientX + 14) + "px";
    tooltip.style.top = (event.clientY - 40) + "px";
    tipImg.src = s.logo || "";
    tipImg.style.display = s.logo ? "" : "none";
    tipRank.textContent = `#${pt.rank}`;
    tipName.textContent = s.name;
    tipDate.textContent = d3.timeFormat("%b %-d, %Y")(pt.date);
  });

  svg.on("mouseleave", clearHover);

  function clearHover() {
    hoveredKey = null;
    paths.classed("hovered", false);
    endLabel.style("display", "none");
    tooltip.style.display = "none";
  }
}

window.addEventListener("resize", render);
loadData();
</script>
</body>
</html>
