name: Daily Leaderboard Scrape

on:
  schedule:
    - cron: "30 6 * * *"   # 30 min after Vercel cron as a backup check
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Verify today's data was committed
        id: verify
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://raw.githubusercontent.com/${{ github.repository }}/main/data/${TODAY}.json")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "date=$TODAY" >> $GITHUB_OUTPUT
          if [ "$STATUS" != "200" ]; then
            echo "Data file for $TODAY not found (HTTP $STATUS)"
            exit 1
          fi
          echo "Data for $TODAY confirmed present"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = "${{ steps.verify.outputs.date }}";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Missing leaderboard data: ${today}`,
              body: `No data file found for ${today}. The Vercel cron may have failed.\n\n[View run](${runUrl})\n\nCheck the Vercel function logs at https://vercel.com/brent-sullivans-projects/substack-tracker`
            });
